services:

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: swingtrader_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: swingtrader_worker
    env_file: .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: swingtrader_postgres
    environment:
      POSTGRES_DB: swingtrader
      POSTGRES_USER: swingtrader
      POSTGRES_PASSWORD: swingtrader
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: swingtrader_redis
    ports:
      - "6379:6379"

  ml-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.tml
    command: celery -A swingtraderai.celery worker -Q ml,training,inference -c 2 --loglevel=info
    volumes:
      - ./models:/app/models
    depends_on:
      - redis
      - rabbitmq
      - db
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  pgdata:
